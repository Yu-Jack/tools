<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊費用計算機</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #F5EFE6;
      --bg-alt:      #EDE5D8;
      --paper:       #FAF6F0;
      --ink:         #2C2418;
      --ink-light:   #6B5E4E;
      --sakura:      #C47C8A;
      --sakura-pale: rgba(196,124,138,0.12);
      --gold:        #B8956A;
      --indigo:      #3D4E6B;
      --border:      #D4C9BA;
      --row-hover:   #F0E8DA;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 18% 55%, rgba(196,124,138,.09) 0%, transparent 55%),
        radial-gradient(ellipse at 82% 18%, rgba(184,149,106,.11) 0%, transparent 50%);
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink);
      padding: 2.5rem 1rem 4rem;
    }

    .container { max-width: 880px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2.4rem;
      animation: fadeDown .55s ease both;
    }
    .header .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: .82rem;
      letter-spacing: .35em;
      color: var(--sakura);
      margin-bottom: .45rem;
    }
    .header h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 2.6rem;
      font-weight: 600;
      letter-spacing: .12em;
      line-height: 1.15;
    }
    .header .sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: .9rem;
      color: var(--ink-light);
      margin-top: .35rem;
      letter-spacing: .06em;
    }
    .header .rule {
      width: 72px; height: 1px;
      background: linear-gradient(to right, transparent, var(--sakura), transparent);
      margin: .9rem auto 0;
    }

    /* ── Cards ── */
    .card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 3px;
      box-shadow: 0 2px 14px rgba(44,36,24,.07);
    }

    /* ── Rate bar ── */
    .rate-bar {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1.4rem;
      margin-bottom: 1.2rem;
      animation: fadeUp .5s .08s ease both;
    }
    .rate-bar .flag { font-size: 1.25rem; }
    .rate-bar .label {
      font-family: 'Shippori Mincho', serif;
      font-size: .72rem;
      letter-spacing: .14em;
      color: var(--ink-light);
      white-space: nowrap;
    }
    .rate-eq {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: .85rem;
      color: var(--ink-light);
      flex: 1;
    }
    .rate-eq input {
      width: 76px;
      padding: .28rem .5rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg);
      font-family: 'Noto Sans TC', monospace;
      font-size: .95rem;
      color: var(--ink);
      text-align: center;
      transition: border-color .18s, box-shadow .18s;
    }
    .rate-eq input:focus {
      outline: none;
      border-color: var(--sakura);
      box-shadow: 0 0 0 3px var(--sakura-pale);
    }
    .rate-info {
      font-size: .72rem;
      color: var(--ink-light);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      margin-left: auto;
    }

    /* ── Input card ── */
    .input-card {
      padding: 1.4rem 1.5rem;
      margin-bottom: 1.2rem;
      animation: fadeUp .5s .16s ease both;
    }
    .card-label {
      font-family: 'Shippori Mincho', serif;
      font-size: .66rem;
      letter-spacing: .22em;
      color: var(--ink-light);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr auto;
      gap: 1rem;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: .38rem; }
    .field label {
      font-size: .72rem;
      letter-spacing: .08em;
      color: var(--ink-light);
      font-weight: 500;
    }
    .field input {
      padding: .58rem .8rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      transition: border-color .18s, box-shadow .18s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--sakura);
      box-shadow: 0 0 0 3px var(--sakura-pale);
    }
    .field input.error { border-color: var(--sakura) !important; }

    .add-btn {
      padding: .58rem 1.4rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 2px;
      font-family: 'Shippori Mincho', serif;
      font-size: 1.05rem;
      letter-spacing: .12em;
      cursor: pointer;
      transition: background .18s, transform .1s;
      white-space: nowrap;
    }
    .add-btn:hover  { background: var(--sakura); }
    .add-btn:active { transform: scale(.96); }

    /* ── Results card ── */
    .results-card {
      overflow: hidden;
      animation: fadeUp .5s .24s ease both;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .85rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }
    .results-header h2 {
      font-family: 'Shippori Mincho', serif;
      font-size: .68rem;
      letter-spacing: .22em;
      color: var(--ink-light);
      text-transform: uppercase;
    }
    .badge {
      font-size: .68rem;
      color: var(--sakura);
      font-weight: 500;
      font-family: 'Noto Sans TC', sans-serif;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: .65rem 1rem;
      text-align: right;
      font-size: .68rem;
      letter-spacing: .12em;
      color: var(--ink-light);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      white-space: nowrap;
    }
    thead th:nth-child(1),
    thead th:nth-child(2),
    thead th:nth-child(3),
    thead th:nth-child(4) { text-align: center; }
    thead th:last-child { text-align: center; }

    tbody tr {
      border-bottom: 1px solid rgba(212,201,186,.45);
      transition: background .14s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    tbody tr.row-in  { animation: rowIn  .28s ease both; }
    tbody tr.row-out { animation: rowOut .26s ease forwards; }

    tbody td {
      padding: .82rem 1rem;
      font-size: .88rem;
      text-align: right;
    }
    tbody td:nth-child(1) {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--ink-light);
      font-size: .82rem;
    }
    tbody td:nth-child(2),
    tbody td:nth-child(3),
    tbody td:nth-child(4) { text-align: center; }
    tbody td:last-child { text-align: center; }

    .amt-twd { color: var(--indigo); font-weight: 500; }
    .amt-jpy { color: var(--gold);   font-weight: 500; }

    .del-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 50%;
      width: 24px; height: 24px;
      cursor: pointer;
      color: var(--ink-light);
      font-size: .9rem;
      transition: all .18s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .del-btn:hover {
      background: var(--sakura-pale);
      border-color: var(--sakura);
      color: var(--sakura);
    }

    /* ── Total row ── */
    tfoot .total-row {
      background: var(--bg-alt);
    }
    tfoot .total-row td {
      padding: 1rem 1rem;
      border-top: 2px solid var(--border);
      font-family: 'Shippori Mincho', serif;
      font-weight: 600;
    }
    tfoot .total-row td:first-child {
      text-align: left;
      font-size: .72rem;
      letter-spacing: .14em;
      color: var(--ink-light);
      padding-left: 1rem;
    }
    .total-twd { font-size: 1.1rem; color: var(--indigo) !important; text-align:right; }
    .total-jpy { font-size: 1.1rem; color: var(--gold)   !important; text-align:right; }

    /* ── Empty state ── */
    .empty-state {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--ink-light);
    }
    .empty-icon { font-size: 2.2rem; opacity: .35; margin-bottom: .7rem; }
    .empty-state p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: .9rem;
      letter-spacing: .05em;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes rowIn {
      from { opacity:0; transform:translateX(-10px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes rowOut {
      from { opacity:1; transform:translateX(0); max-height:80px; }
      to   { opacity:0; transform:translateX(10px); max-height:0; padding-top:0; padding-bottom:0; }
    }

    /* ── Responsive ── */
    @media (max-width:620px) {
      .input-row { grid-template-columns:1fr 1fr; }
      .add-btn   { grid-column: span 2; }
      .rate-info { display:none; }
      thead th, tbody td { padding:.55rem .55rem; font-size:.78rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="eyebrow">Travel Cost Calculator</div>
    <h1>旅遊費用計算機</h1>
    <p class="sub">Japan trip budget planner</p>
    <div class="rule"></div>
  </header>

  <!-- Exchange Rate -->
  <div class="card rate-bar">
    <span class="flag">🇯🇵</span>
    <span class="label">匯率設定</span>
    <div class="rate-eq">
      <span>1 JPY =</span>
      <input type="number" id="rateInput" value="0.2" min="0.001" step="0.001">
      <span>TWD</span>
    </div>
    <span class="rate-info" id="rateInfo">1 TWD ≈ 5.00 JPY</span>
    <span class="flag">🇹🇼</span>
  </div>

  <!-- Input -->
  <div class="card input-card">
    <div class="card-label">新增行程費用</div>
    <div class="input-row">
      <div class="field">
        <label>人數</label>
        <input type="number" id="fPeople" min="1" value="1" placeholder="人">
      </div>
      <div class="field">
        <label>每晚 / 人（NT$）</label>
        <input type="number" id="fPrice" min="0" value="" placeholder="2000">
      </div>
      <div class="field">
        <label>天數（晚）</label>
        <input type="number" id="fNights" min="1" value="1" placeholder="晚">
      </div>
      <button class="add-btn" type="button" id="addBtn">＋ 新增</button>
    </div>
  </div>

  <!-- Results -->
  <div class="card results-card">
    <div class="results-header">
      <h2>費用明細</h2>
      <span class="badge" id="badge">0 筆</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>人數</th>
          <th>每晚/人</th>
          <th>天數</th>
          <th>台幣總計</th>
          <th>日幣總計</th>
          <th>刪除</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot" style="display:none">
        <tr class="total-row">
          <td colspan="4">合　計</td>
          <td class="total-twd" id="totalTWD"></td>
          <td class="total-jpy" id="totalJPY"></td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>

</div>

<script>
  var rows = [];
  var uid = 0;

  function getEl(id) { return document.getElementById(id); }
  function getRate() { return parseFloat(getEl('rateInput').value) || 0.2; }
  function fmt(n) { return n.toLocaleString('zh-TW'); }

  function updateRateInfo() {
    var r = getRate();
    getEl('rateInfo').textContent = '1 TWD ≈ ' + (1 / r).toFixed(2) + ' JPY';
  }

  function render() {
    var tbody = getEl('tbody');
    tbody.innerHTML = '';

    if (rows.length === 0) {
      tbody.innerHTML =
        '<tr><td colspan="7" style="padding:0;border:none;">' +
        '<div class="empty-state"><div class="empty-icon">✈️</div>' +
        '<p>尚無費用項目，點選「＋ 新增」開始規劃</p></div></td></tr>';
      getEl('tfoot').style.display = 'none';
      getEl('badge').textContent = '0 筆';
      return;
    }

    var exchRate = getRate();
    var grandTWD = 0;

    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      grandTWD += row.twd;
      var jpy = Math.round(row.twd / exchRate);
      var tr = document.createElement('tr');
      tr.id = 'r' + row.id;
      tr.className = 'row-in';
      tr.innerHTML =
        '<td>' + (i + 1) + '</td>' +
        '<td>' + row.people + ' 人</td>' +
        '<td>' + fmt(row.price) + '</td>' +
        '<td>' + row.nights + ' 晚</td>' +
        '<td class="amt-twd">NT$ ' + fmt(row.twd) + '</td>' +
        '<td class="amt-jpy">¥ ' + fmt(jpy) + '</td>' +
        '<td><button type="button" class="del-btn" data-id="' + row.id + '">×</button></td>';
      tbody.appendChild(tr);
    }

    var grandJPY = Math.round(grandTWD / exchRate);
    getEl('totalTWD').textContent = 'NT$ ' + fmt(grandTWD);
    getEl('totalJPY').textContent = '¥ ' + fmt(grandJPY);
    getEl('tfoot').style.display = '';
    getEl('badge').textContent = rows.length + ' 筆';
  }

  function addRow() {
    var people = parseInt(getEl('fPeople').value, 10) || 1;
    var price  = parseInt(getEl('fPrice').value,  10);
    var nights = parseInt(getEl('fNights').value, 10) || 1;

    if (!price || price <= 0) {
      var priceEl = getEl('fPrice');
      priceEl.classList.add('error');
      priceEl.focus();
      setTimeout(function() { priceEl.classList.remove('error'); }, 1400);
      return;
    }

    uid++;
    rows.push({ id: uid, people: people, price: price, nights: nights,
                twd: people * price * nights });
    render();
    getEl('fPrice').value = '';
    getEl('fPrice').focus();
  }

  function deleteRow(id) {
    var tr = getEl('r' + id);
    if (!tr) return;
    tr.classList.remove('row-in');
    tr.classList.add('row-out');
    setTimeout(function() {
      rows = rows.filter(function(row) { return row.id !== id; });
      render();
    }, 260);
  }

  // Event listeners
  getEl('addBtn').addEventListener('click', function() { addRow(); });

  getEl('rateInput').addEventListener('input', function() {
    updateRateInfo();
    render();
  });

  getEl('tbody').addEventListener('click', function(e) {
    var btn = e.target.closest('.del-btn');
    if (btn) deleteRow(parseInt(btn.dataset.id, 10));
  });

  ['fPeople', 'fPrice', 'fNights'].forEach(function(id) {
    getEl(id).addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addRow();
    });
  });

  // Init
  updateRateInfo();
  render();
</script>
</body>
</html>
