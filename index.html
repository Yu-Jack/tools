<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yu-Jack's Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #F5EFE6;
      --bg-alt:      #EDE5D8;
      --paper:       #FAF6F0;
      --ink:         #2C2418;
      --ink-light:   #6B5E4E;
      --sakura:      #C47C8A;
      --sakura-pale: rgba(196,124,138,0.12);
      --gold:        #B8956A;
      --indigo:      #3D4E6B;
      --border:      #D4C9BA;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 18% 55%, rgba(196,124,138,.09) 0%, transparent 55%),
        radial-gradient(ellipse at 82% 18%, rgba(184,149,106,.11) 0%, transparent 50%);
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink);
      padding: 3.5rem 1rem 5rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 3.2rem;
      animation: fadeDown .55s ease both;
    }
    .header .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: .82rem;
      letter-spacing: .38em;
      color: var(--sakura);
      margin-bottom: .5rem;
    }
    .header h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: .14em;
      line-height: 1.2;
      color: var(--ink);
    }
    .header .sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: .9rem;
      color: var(--ink-light);
      margin-top: .4rem;
      letter-spacing: .06em;
    }
    .header .rule {
      width: 72px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--sakura), transparent);
      margin: 1rem auto 0;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.4rem;
    }

    /* ── Tool Card ── */
    .tool-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 3px;
      box-shadow: 0 2px 14px rgba(44,36,24,.07);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      padding: 1.6rem 1.4rem 1.4rem;
      gap: .6rem;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      animation: fadeUp .5s ease both;
      position: relative;
      overflow: hidden;
    }
    .tool-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--sakura), var(--gold));
      opacity: 0;
      transition: opacity .2s ease;
    }
    .tool-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(44,36,24,.12);
      border-color: rgba(196,124,138,.4);
    }
    .tool-card:hover::before {
      opacity: 1;
    }

    .tool-card .icon {
      font-size: 1.6rem;
      line-height: 1;
      margin-bottom: .2rem;
    }
    .tool-card .name {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--ink);
    }
    .tool-card .desc {
      font-size: .78rem;
      color: var(--ink-light);
      letter-spacing: .02em;
      line-height: 1.55;
      flex: 1;
    }
    .tool-card .arrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: .75rem;
      letter-spacing: .18em;
      color: var(--sakura);
      margin-top: .4rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .tool-card .arrow::after {
      content: '→';
      transition: transform .18s ease;
    }
    .tool-card:hover .arrow::after {
      transform: translateX(4px);
    }

    /* ── Stagger delays ── */
    .tool-card:nth-child(1) { animation-delay: .05s; }
    .tool-card:nth-child(2) { animation-delay: .12s; }
    .tool-card:nth-child(3) { animation-delay: .19s; }
    .tool-card:nth-child(4) { animation-delay: .26s; }
    .tool-card:nth-child(5) { animation-delay: .33s; }
    .tool-card:nth-child(6) { animation-delay: .40s; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 3.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: .8rem;
      color: var(--border);
      letter-spacing: .12em;
      animation: fadeUp .5s .45s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <p class="eyebrow">Yu-Jack</p>
      <h1>小工具集</h1>
      <p class="sub">A collection of handy tools</p>
      <div class="rule"></div>
    </header>

    <div class="grid">

      <a class="tool-card" href="travel-calculator.html">
        <div class="icon">✈️</div>
        <div class="name">旅遊費用計算機</div>
        <div class="desc">多幣別旅遊開銷記錄，自動換算回台幣，輕鬆掌握每筆花費。</div>
        <div class="arrow">開啟工具</div>
      </a>

      <a class="tool-card" href="stock-pledge-calculator.html">
        <div class="icon">📊</div>
        <div class="name">股票質押計算機</div>
        <div class="desc">輸入張數、股價與借貸金額，即時計算維持率、警戒線、追繳線與斷頭線。</div>
        <div class="arrow">開啟工具</div>
      </a>

      <!-- Add more tool cards here -->

    </div>

    <footer class="footer">— more tools coming soon —</footer>

  </div>
</body>
</html>
